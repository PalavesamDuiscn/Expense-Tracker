<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Expense Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="wrapper">
  <header>
    <h1>Expense<span>.</span>Track</h1>
    <span class="date-chip" id="dateChip"></span>
  </header>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-label">Total Spent</div>
      <div class="stat-value" id="totalSpent">₹0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">This Month</div>
      <div class="stat-value" id="monthSpent">₹0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Top Category</div>
      <div class="stat-value" id="topCat">—</div>
    </div>
  </div>

  <div class="main-grid">
    <!-- FORM -->
    <div class="form-card">
      <h2>Add Expense</h2>
      <div class="field">
        <label for="desc">Description</label>
        <input type="text" id="desc" placeholder="e.g. Lunch, Uber ride…"/>
      </div>
      <div class="field">
        <label for="amount">Amount (₹)</label>
        <input type="number" id="amount" placeholder="0.00" min="0" step="0.01"/>
      </div>
      <div class="field">
        <label for="category">Category</label>
        <select id="category">
          <option value="Food">🍔 Food</option>
          <option value="Transport">🚌 Transport</option>
          <option value="Shopping">🛍 Shopping</option>
          <option value="Entertainment">🎬 Entertainment</option>
          <option value="Health">💊 Health</option>
          <option value="Utilities">⚡ Utilities</option>
          <option value="Other">📦 Other</option>
        </select>
      </div>
      <div class="field">
        <label for="date">Date</label>
        <input type="date" id="date"/>
      </div>
      <button class="add-btn" onclick="addExpense()">+ Add Expense</button>

      <div class="chart-section">
        <h3>By Category</h3>
        <div id="barChart"></div>
      </div>
    </div>

    <!-- LIST -->
    <div class="list-card">
      <div class="list-header">
        <h2>Transactions</h2>
        <button class="clear-btn" onclick="clearAll()">Clear All</button>
      </div>
      <div class="expense-list" id="expenseList"></div>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
